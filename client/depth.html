<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Book Depth Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e11;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #f0b90b;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            background: #f0b90b;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #0b0e11;
        }

        button:hover {
            background: #fcd535;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #1e2329;
            border-radius: 4px;
        }

        .order-book {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .book-side {
            background: #1e2329;
            border-radius: 8px;
            padding: 15px;
        }

        .book-side h2 {
            margin-bottom: 15px;
            text-align: center;
        }

        .bids h2 {
            color: #0ecb81;
        }

        .asks h2 {
            color: #f6465d;
        }

        .book-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 8px;
            font-weight: bold;
            border-bottom: 1px solid #2b3139;
            margin-bottom: 5px;
            font-size: 12px;
            color: #848e9c;
        }

        .book-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 6px 8px;
            font-size: 13px;
            position: relative;
            overflow: hidden;
        }

        .book-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            opacity: 0.1;
        }

        .bids .book-row::before {
            background: #0ecb81;
        }

        .asks .book-row::before {
            background: #f6465d;
        }

        .book-row > div {
            position: relative;
            z-index: 1;
        }

        .price {
            font-weight: bold;
        }

        .bids .price {
            color: #0ecb81;
        }

        .asks .price {
            color: #f6465d;
        }

        .quantity {
            text-align: right;
        }

        .total {
            text-align: right;
            color: #848e9c;
        }

        @media (max-width: 768px) {
            .order-book {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Order Book Depth - XRPUSDT</h1>
        
        <div class="controls">
            <button id="connectBtn" onclick="connect()">Connect SSE</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            <button onclick="loadSnapshot()">Load Snapshot</button>
        </div>

        <div class="status" id="status">
            Status: Disconnected
        </div>

        <div class="order-book">
            <div class="book-side bids">
                <h2>Bids (Buy Orders)</h2>
                <div class="book-header">
                    <div>Price</div>
                    <div style="text-align: right;">Quantity</div>
                    <div style="text-align: right;">Total</div>
                </div>
                <div id="bidsContainer"></div>
            </div>

            <div class="book-side asks">
                <h2>Asks (Sell Orders)</h2>
                <div class="book-header">
                    <div>Price</div>
                    <div style="text-align: right;">Quantity</div>
                    <div style="text-align: right;">Total</div>
                </div>
                <div id="asksContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let orderBook = {
            bids: new Map(),
            asks: new Map()
        };
        let lastUpdateId = 0;
        let previousFinalUpdateId = 0;
        let isInitialized = false;

        const API_BASE = 'http://localhost:8080';
        const MAX_DISPLAY = 20;

        function updateStatus(message, color = '#848e9c') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = color;
        }

        async function loadSnapshot() {
            try {
                updateStatus('Loading snapshot...', '#f0b90b');
                const response = await fetch(`${API_BASE}/binance/depth?symbol=XRPUSDT`);
                const data = await response.json();
                
                lastUpdateId = data.lastUpdateId;
                orderBook.bids.clear();
                orderBook.asks.clear();

                data.bids.forEach(([price, quantity]) => {
                    if (quantity > 0) {
                        orderBook.bids.set(price, quantity);
                    }
                });

                data.asks.forEach(([price, quantity]) => {
                    if (quantity > 0) {
                        orderBook.asks.set(price, quantity);
                    }
                });

                isInitialized = true;
                renderOrderBook();
                updateStatus(`Snapshot loaded. Last Update ID: ${lastUpdateId}`, '#0ecb81');
            } catch (error) {
                updateStatus('Error loading snapshot: ' + error.message, '#f6465d');
                console.error('Snapshot error:', error);
            }
        }

        function connect() {
            if (eventSource) return;

            updateStatus('Connecting to SSE...', '#f0b90b');
            eventSource = new EventSource(`${API_BASE}/binance/stream/depth?symbol=XRPUSDT`);

            eventSource.onopen = () => {
                updateStatus('Connected to SSE stream', '#0ecb81');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
            };

            eventSource.onmessage = (event) => {
                try {
                    const depth = JSON.parse(event.data);
                    processDepthUpdate(depth);
                } catch (error) {
                    console.error('Parse error:', error);
                }
            };

            eventSource.onerror = () => {
                updateStatus('SSE connection error', '#f6465d');
                disconnect();
            };
        }

        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
                updateStatus('Disconnected', '#848e9c');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
            }
        }

        function processDepthUpdate(depth) {
            if (depth.finalUpdateId < lastUpdateId) {
                console.log('Dropping old event:', depth.finalUpdateId);
                return;
            }

            if (!isInitialized) {
                if (depth.firstUpdateId <= lastUpdateId && depth.finalUpdateId >= lastUpdateId) {
                    isInitialized = true;
                } else {
                    console.log('Waiting for first valid event');
                    return;
                }
            }

            if (previousFinalUpdateId !== 0 && depth.previousFinalUpdateId !== previousFinalUpdateId) {
                console.warn('Continuity broken! Reinitializing...');
                loadSnapshot();
                return;
            }

            depth.bids.forEach(([price, quantity]) => {
                if (quantity === 0) {
                    orderBook.bids.delete(price);
                } else {
                    orderBook.bids.set(price, quantity);
                }
            });

            depth.asks.forEach(([price, quantity]) => {
                if (quantity === 0) {
                    orderBook.asks.delete(price);
                } else {
                    orderBook.asks.set(price, quantity);
                }
            });

            previousFinalUpdateId = depth.finalUpdateId;
            renderOrderBook();
        }

        function renderOrderBook() {
            renderSide('bids', orderBook.bids, true);
            renderSide('asks', orderBook.asks, false);
        }

        function renderSide(side, orders, isBid) {
            const container = document.getElementById(side + 'Container');
            
            const sorted = Array.from(orders.entries())
                .sort((a, b) => isBid ? b[0] - a[0] : a[0] - b[0])
                .slice(0, MAX_DISPLAY);

            let runningTotal = 0;
            const withTotals = sorted.map(([price, quantity]) => {
                runningTotal += quantity;
                return [price, quantity, runningTotal];
            });

            const maxTotal = runningTotal;

            container.innerHTML = withTotals.map(([price, quantity, total]) => {
                const percentage = (total / maxTotal) * 100;
                return `
                    <div class="book-row" style="--width: ${percentage}%">
                        <div class="price">${parseFloat(price).toFixed(4)}</div>
                        <div class="quantity">${parseFloat(quantity).toFixed(1)}</div>
                        <div class="total">${parseFloat(total).toFixed(1)}</div>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('load', () => {
            loadSnapshot().then(() => {
                setTimeout(connect, 1000);
            });
        });
    </script>
</body>
</html>
