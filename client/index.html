<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Resistance Tracker</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <aside class="config-panel">
            <h2>Configuration</h2>

            <div class="config-section">
                <h3>Symbol</h3>
                <select id="symbolSelect" style="width: 100%; padding: 8px; background: #2a2a3e; color: #e0e0e0; border: 1px solid #3a3a4e; border-radius: 4px; cursor: pointer;">
                    <option value="BTCUSDT">BTCUSDT</option>
                    <option value="XRPUSDT">XRPUSDT</option>
                </select>
            </div>

            <div class="config-section">
                <h3>Timeframe</h3>
                <div class="timeframe-buttons">
                    <button class="timeframe-btn active" data-interval="1m">1m</button>
                    <button class="timeframe-btn" data-interval="3m">3m</button>
                    <button class="timeframe-btn" data-interval="5m">5m</button>
                    <button class="timeframe-btn" data-interval="15m">15m</button>
                    <button class="timeframe-btn" data-interval="30m">30m</button>
                    <button class="timeframe-btn" data-interval="1h">1h</button>
                    <button class="timeframe-btn" data-interval="2h">2h</button>
                    <button class="timeframe-btn" data-interval="4h">4h</button>
                    <button class="timeframe-btn" data-interval="6h">6h</button>
                    <button class="timeframe-btn" data-interval="8h">8h</button>
                    <button class="timeframe-btn" data-interval="12h">12h</button>
                    <button class="timeframe-btn" data-interval="1d">1d</button>
                    <button class="timeframe-btn" data-interval="3d">3d</button>
                    <button class="timeframe-btn" data-interval="1w">1w</button>
                    <button class="timeframe-btn" data-interval="1M">1M</button>
                </div>
            </div>

            <div class="config-item">
                <label>Update Interval</label>
                <span id="interval-display">1s</span>
            </div>
            <div class="config-item">
                <label>Current Price</label>
                <span id="current-price">--</span>
            </div>
            <div class="config-item">
                <label>Resistance Level</label>
                <span id="resistance-level" class="resistance">--</span>
            </div>
            <div class="config-item">
                <label>Support Level</label>
                <span id="support-level" class="support">--</span>
            </div>
            <div class="config-item">
                <label>Data Points</label>
                <span id="data-count">0</span>
            </div>
            <div class="config-item">
                <label>Next Candle In</label>
                <span id="countdown-display">00:00:00</span>
            </div>
        </aside>

        <main class="chart-area">
            <h1>Real-Time Price Chart</h1>
            <div id="chart-wrapper">
                <div id="chart"></div>
                <div id="price-countdown"></div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
